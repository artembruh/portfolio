name: CI/CD

concurrency:
  group: deploy
  cancel-in-progress: false

on:
  push:
    branches: [main]

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Backend typecheck
        run: yarn workspace backend build

#      - name: Backend tests
#        run: yarn workspace backend test

  deploy:
    name: Deploy to VPS
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Get runner IP
        id: ip
        run: echo "runner_ip=$(curl -sf https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Open SSH in Hetzner firewall
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          pip install hcloud-cli -q 2>/dev/null || true
          curl -sL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz | tar xz -C /usr/local/bin
          hcloud firewall add-rule portfolio-fw \
            --direction in --protocol tcp --port 22 \
            --source-ips "${{ steps.ip.outputs.runner_ip }}/32" \
            --description "GitHub Actions deploy (ephemeral)"

      - name: Deploy via SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" << 'DEPLOY'
            set -e
            cd /opt/portfolio

            # Tag current images for rollback
            docker tag portfolio-backend:latest portfolio-backend:prev 2>/dev/null || true
            docker tag portfolio-nginx:latest portfolio-nginx:prev 2>/dev/null || true

            # Pull and rebuild
            git pull origin main
            docker compose down --remove-orphans
            docker compose up -d --build

            # Verify deploy (backend port not exposed on host — check via docker exec)
            sleep 10
            docker exec portfolio-backend-1 curl -sf http://localhost:3000/api/health > /dev/null || {
              echo "Health check failed — rolling back"
              docker tag portfolio-backend:prev portfolio-backend:latest 2>/dev/null || true
              docker tag portfolio-nginx:prev portfolio-nginx:latest 2>/dev/null || true
              docker compose up -d
              exit 1
            }

            echo "Deploy successful"
          DEPLOY

      - name: Close SSH in Hetzner firewall
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          hcloud firewall delete-rule portfolio-fw \
            --direction in --protocol tcp --port 22 \
            --source-ips "${{ steps.ip.outputs.runner_ip }}/32" \
            --description "GitHub Actions deploy (ephemeral)"
