# =============================================================================
# Nginx reverse proxy config for artembratchenko.com
# - HTTP → HTTPS redirect (port 80)
# - HTTPS with Let's Encrypt certs (port 443)
# - React SPA served from /usr/share/nginx/html with client-side route fallback
# - NestJS API proxied at /api/
# - Socket.IO WebSocket proxied at /socket.io/ with 24h timeout (D-07, D-08)
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name artembratchenko.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name artembratchenko.com;

    ssl_certificate     /etc/letsencrypt/live/artembratchenko.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artembratchenko.com/privkey.pem;

    # Gzip compression for static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA — React build with client-side route fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # API — NestJS backend proxy
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — WebSocket upgrade proxy (per D-07, D-08)
    # proxy_http_version 1.1 required for WebSocket upgrade
    # Connection "upgrade" must be a literal string (not $connection_upgrade variable)
    # proxy_read_timeout 86400s lets Socket.IO ping/pong manage connection lifecycle
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
